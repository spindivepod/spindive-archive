let activeFilter = 'all';

function getSeasonLabel(season) {
  return { s1: 'Season 1', s2: 'Season 2', s3: 'Season 3' }[season];
}

function renderCards(list) {
  const grid = document.getElementById('grid');
  const noResults = document.getElementById('no-results');
  grid.innerHTML = '';
  if (list.length === 0) { noResults.style.display = 'block'; return; }
  noResults.style.display = 'none';
  document.getElementById('count').textContent = list.length + ' episode' + (list.length !== 1 ? 's' : '');
  list.forEach(ep => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-header">
        <div class="ep-title">${ep.title}</div>
        <span class="ep-badge ${ep.season}">${getSeasonLabel(ep.season)}</span>
      </div>
      <div class="ep-date">${ep.date}</div>
      <div class="ep-desc">${ep.desc}</div>
      <div class="ep-tags">
        ${ep.year ? `<span class="ep-year">📅 ${ep.year} dive</span>` : ''}
        ${ep.hasTranscript ? '<span class="ep-transcript">🔍 searchable</span>' : ''}
      </div>
    `;
    grid.appendChild(card);
  });
}

function filterEpisodes() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const terms = q.split(/\s+/).filter(Boolean);
  let list = episodes;

  if (activeFilter === 'year') list = list.filter(e => e.year);
  else if (activeFilter === 'transcript') list = list.filter(e => e.hasTranscript);
  else if (activeFilter !== 'all') list = list.filter(e => e.season === activeFilter);

  if (terms.length > 0) {
    list = list.filter(ep => {
      const searchable = [ep.title, ep.desc, ep.year, ep.keywords || ''].join(' ').toLowerCase();
      return terms.every(t => searchable.includes(t));
    });
  }
  renderCards(list);
}

function setFilter(filter, btn) {
  activeFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterEpisodes();
}

renderCards(episodes);
